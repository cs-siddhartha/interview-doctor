services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: pnpm dev --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://interview_doctor:interview_doctor@postgres:5432/interview_doctor
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uv_cache:/root/.cache/uv
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: interview_doctor
      POSTGRES_USER: interview_doctor
      POSTGRES_PASSWORD: interview_doctor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  backend_uv_cache:
  postgres_data:
  redis_data:
